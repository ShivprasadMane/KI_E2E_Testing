name: E2E Matrix

on:
  push:
    branches: [main, master, dev, test]
  pull_request:
    branches: [main, master, dev, test]
  workflow_dispatch:

concurrency:
  group: e2e-matrix-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-matrix:
    name: Validate Excel matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run matrix:generate

      - run: npm run validate:matrix -- --enabled-only

  matrix-grouped:
    name: Playwright matrix (grouped)
    runs-on: ubuntu-latest
    needs: validate-matrix
    timeout-minutes: 30
    env:
      PORTAL_URL: https://polite-plant-02b096d00.6.azurestaticapps.net
      API_URL: https://test-kiep-api.azurewebsites.net
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: npm run matrix:generate

      - name: Run Excel matrix (grouped)
        run: npm run test:matrix
        env:
          INVESTOR_EMAIL: ${{ secrets.INVESTOR_EMAIL }}
          INVESTOR_PASSWORD: ${{ secrets.INVESTOR_PASSWORD }}
          FUNERAL_DIRECTOR_EMAIL: ${{ secrets.FUNERAL_DIRECTOR_EMAIL }}
          FUNERAL_DIRECTOR_PASSWORD: ${{ secrets.FUNERAL_DIRECTOR_PASSWORD }}
          FINANCIAL_ADVISER_EMAIL: ${{ secrets.FINANCIAL_ADVISER_EMAIL }}
          FINANCIAL_ADVISER_PASSWORD: ${{ secrets.FINANCIAL_ADVISER_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-matrix
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  dashboard-exports:
    name: Dashboard export specs (Excel + PDF)
    runs-on: ubuntu-latest
    needs: validate-matrix
    timeout-minutes: 90
    env:
      PORTAL_URL: https://polite-plant-02b096d00.6.azurestaticapps.net
      API_URL: https://test-kiep-api.azurewebsites.net
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Auth setup (funeral + adviser)
        run: npx playwright test --project=setup-funeral --project=setup-adviser
        env:
          FUNERAL_DIRECTOR_EMAIL: ${{ secrets.FUNERAL_DIRECTOR_EMAIL }}
          FUNERAL_DIRECTOR_PASSWORD: ${{ secrets.FUNERAL_DIRECTOR_PASSWORD }}
          FINANCIAL_ADVISER_EMAIL: ${{ secrets.FINANCIAL_ADVISER_EMAIL }}
          FINANCIAL_ADVISER_PASSWORD: ${{ secrets.FINANCIAL_ADVISER_PASSWORD }}

      - name: Funeral + adviser dashboard exports
        run: npm run test:funeral:export && npm run test:adviser:export

      - name: Upload export test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-exports
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  create-application-specs:
    name: Create application specs (TMD + entry smoke)
    runs-on: ubuntu-latest
    needs: validate-matrix
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'
    env:
      PORTAL_URL: https://polite-plant-02b096d00.6.azurestaticapps.net
      API_URL: https://test-kiep-api.azurewebsites.net
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Auth setup
        run: npx playwright test --project=setup-funeral --project=setup-adviser --project=setup-investor
        env:
          FUNERAL_DIRECTOR_EMAIL: ${{ secrets.FUNERAL_DIRECTOR_EMAIL }}
          FUNERAL_DIRECTOR_PASSWORD: ${{ secrets.FUNERAL_DIRECTOR_PASSWORD }}
          FINANCIAL_ADVISER_EMAIL: ${{ secrets.FINANCIAL_ADVISER_EMAIL }}
          FINANCIAL_ADVISER_PASSWORD: ${{ secrets.FINANCIAL_ADVISER_PASSWORD }}
          INVESTOR_EMAIL: ${{ secrets.INVESTOR_EMAIL }}
          INVESTOR_PASSWORD: ${{ secrets.INVESTOR_PASSWORD }}

      - name: Create application TMD and entry specs
        run: playwright test --grep "@create-application-tmd|@create-application" --grep-invert "through submit"
        env:
          INVESTOR_EMAIL: ${{ secrets.INVESTOR_EMAIL }}
          INVESTOR_PASSWORD: ${{ secrets.INVESTOR_PASSWORD }}
          FUNERAL_DIRECTOR_EMAIL: ${{ secrets.FUNERAL_DIRECTOR_EMAIL }}
          FUNERAL_DIRECTOR_PASSWORD: ${{ secrets.FUNERAL_DIRECTOR_PASSWORD }}
          FINANCIAL_ADVISER_EMAIL: ${{ secrets.FINANCIAL_ADVISER_EMAIL }}
          FINANCIAL_ADVISER_PASSWORD: ${{ secrets.FINANCIAL_ADVISER_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-create-application
          path: |
            playwright-report/
            test-results/
          retention-days: 7
